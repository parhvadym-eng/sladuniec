<!DOCTYPE html>
<html>
<head>
  <title>Countdown Timer</title>
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: Arial;
      margin: 0;
      background-color: #f5f5f5;
    }
    
    .container {
      display: flex;
      align-items: center;
      gap: 80px;
    }
    
    .image {
      flex-shrink: 0;
    }
    
    .image img {
      width: 450px;
      height: 450px;
      border-radius: 10px;
      object-fit: cover;
    }
    
    .content {
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    
    .title {
      font-size: 48px;
      margin-bottom: 30px;
      color: #333;
      font-weight: bold;
    }
    
    #timer {
      font-size: 72px;
      color: #333;
      font-weight: bold;
      min-width: 500px;
    }
    
    .subtitle {
      font-size: 48px;
      color: red;
      margin-top: 30px;
      font-weight: bold;
    }
  </style>
</head>
<body>

<div class="container">
  <div class="image">
    <img src="https://github.com/parhvadym-eng/sladuniec/raw/main/image.jpg" alt="Photo">
  </div>
  
  <div class="content">
    <div class="title">Зворотнiй відлік</div>
    <div id="timer"></div>
    <div class="subtitle">ЩЯБЗЮЦЩМЖЬЩЩ</div>
  </div>
</div>

<script>
  const endDate = new Date("2026-04-29 21:00:00").getTime();

  const x = setInterval(function() {
    const now = new Date().getTime();
    const distance = endDate - now;

    const days = Math.floor(distance / (1000 * 60 * 60 * 24));
    const hours = Math.floor((distance / (1000 * 60 * 60)) % 24);
    const minutes = Math.floor((distance / (1000 * 60)) % 60);
    const seconds = Math.floor((distance / 1000) % 60);

    document.getElementById("timer").innerHTML =
      days + "d " + hours + "h " + minutes + "m " + seconds + "s ";

    if (distance < 0) {
      clearInterval(x);
      document.getElementById("timer").innerHTML = "TIME UP";
    }
  }, 1000);
</script>

</body>

</html>
