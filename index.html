<!DOCTYPE html>
<html>
<head>
  <title>Website</title>
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: Arial;
      margin: 0;
      background-color: #f5f5f5;
    }
    
    .container {
      display: flex;
      align-items: center;
      gap: 80px;
    }
    
    .image {
      flex-shrink: 0;
    }
    
    .image img {
      width: 450px;
      height: 450px;
      border-radius: 10px;
      object-fit: cover;
    }
    
    .content {
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    
    .subtitle {
      font-size: 48px;
      color: red;
      margin-top: 30px;
      font-weight: bold;
    }
  </style>
</head>
<body>

<div class="container">
  <div class="image">
    <img src="https://github.com/parhvadym-eng/sladuniec/raw/main/image.jpg" alt="Photo">
  </div>
  
  <div class="content">
    <div class="subtitle">ПIДОР :)</div>
  </div>
</div>

</body>

</html>
